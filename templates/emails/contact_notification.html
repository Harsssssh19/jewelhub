<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Contact Message</title>
  </head>
  <body style="margin:0;padding:0;background-color:#f5f7fb;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f5f7fb;padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="640" cellspacing="0" cellpadding="0" style="max-width:640px;background:#ffffff;border-radius:10px;overflow:hidden;border:1px solid #e5e7eb;">
            <tr>
              <td style="padding:22px 28px;background:linear-gradient(90deg,#111827,#374151);color:#ffffff;">
                <h2 style="margin:0;font-size:22px;line-height:1.3;">New Contact Form Submission</h2>
                <p style="margin:6px 0 0;font-size:13px;opacity:.9;">Jewelry Shop Website</p>
              </td>
            </tr>
            <tr>
              <td style="padding:24px 28px;">
                <p style="margin:0 0 14px;font-size:14px;color:#4b5563;">You received a new message from the Contact Us page.</p>

                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;">
                  <tr>
                    <td style="width:140px;padding:10px 12px;background:#f9fafb;border:1px solid #e5e7eb;font-size:13px;font-weight:700;color:#111827;">Name</td>
                    <td style="padding:10px 12px;border:1px solid #e5e7eb;font-size:13px;color:#111827;">{{ name }}</td>
                  </tr>
                  <tr>
                    <td style="width:140px;padding:10px 12px;background:#f9fafb;border:1px solid #e5e7eb;font-size:13px;font-weight:700;color:#111827;">Email</td>
                    <td style="padding:10px 12px;border:1px solid #e5e7eb;font-size:13px;color:#111827;">{{ email }}</td>
                  </tr>
                  <tr>
                    <td style="width:140px;padding:10px 12px;background:#f9fafb;border:1px solid #e5e7eb;font-size:13px;font-weight:700;color:#111827;">Phone</td>
                    <td style="padding:10px 12px;border:1px solid #e5e7eb;font-size:13px;color:#111827;">{{ phone }}</td>
                  </tr>
                </table>

                <div style="margin-top:18px;padding:14px;border:1px solid #e5e7eb;background:#f9fafb;border-radius:8px;">
                  <p style="margin:0 0 8px;font-size:13px;font-weight:700;color:#111827;">Message</p>
                  <p style="margin:0;font-size:14px;line-height:1.6;color:#374151;white-space:pre-wrap;">{{ message }}</p>
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 28px;border-top:1px solid #e5e7eb;background:#fafafa;">
                <p style="margin:0;font-size:12px;color:#6b7280;">This email was generated automatically from the Jewelry Shop contact form.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
